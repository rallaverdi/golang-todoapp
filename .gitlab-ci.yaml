stages:
  - test
  - build
  - deploy

go-test:
  stage: test
  image: golang:1.26.2-bookworm
  script:
    - go test ./..

build-image:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -f cmd/todoapp/Dockerfile -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

deploy-production:
  stage: deploy
  image: alpine:3.23
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
  script:
    - >
      ssh "$DEPLOY_USER@$DEPLOY_HOST"
      "cd /opt/todoapp &&
       APP_IMAGE=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA docker compose -f compose.production.yaml pull todoapp &&
       docker compose -f compose.production.yaml run --rm todoapp-postgres-migrate up &&
       APP_IMAGE=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA docker compose -f compose.production.yaml up -d todoapp"
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual